name: Weekly NFL Data Refresh

on:
  schedule:
    - cron: "0 10 * * 2"  # Tuesday 10:00 UTC (after Monday night nflverse publish)
  workflow_dispatch:       # allow manual trigger for testing

env:
  FLY_APP: nfl-data-api
  REPORT_JSON: /tmp/nfl_report.json

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --frozen --no-dev

      - name: Save previous row counts
        run: |
          if [ -f "data/last_run_counts.json" ]; then
            cp data/last_run_counts.json /tmp/prev_counts.json
          else
            echo '{}' > /tmp/prev_counts.json
          fi

      - name: Run full pipeline
        run: uv run nfl run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Capture nfl check output
        run: uv run nfl check 2>&1 | tee /tmp/nfl_check.txt
        continue-on-error: true

      - name: Generate report JSON
        run: uv run nfl report --format json --output "$REPORT_JSON"

      - name: Commit updated counts file
        run: |
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add data/last_run_counts.json
          git diff --staged --quiet || git commit -m "chore: update last_run_counts.json [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install flyctl
        run: curl -L https://fly.io/install.sh | sh
        env:
          FLYCTL_INSTALL: /root/.fly

      - name: Upload nfl.duckdb to Fly.io volume
        run: |
          export PATH="/root/.fly/bin:$PATH"
          # Sync to ensure write is complete before upload
          sync
          fly sftp shell --app "$FLY_APP" << 'SFTP'
          put data/nfl.duckdb /data/nfl.duckdb
          SFTP
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLYCTL_INSTALL: /root/.fly

      - name: Restart Fly machines to reload DB
        run: |
          export PATH="/root/.fly/bin:$PATH"
          fly machines restart --app "$FLY_APP"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLYCTL_INSTALL: /root/.fly

      - name: Send success report email
        if: success()
        run: |
          uv run python - << 'PYEOF'
          import json, os
          import resend

          report     = json.loads(open(os.environ["REPORT_JSON"]).read())
          prev       = json.loads(open("/tmp/prev_counts.json").read())
          check_out  = open("/tmp/nfl_check.txt").read()

          prev_counts = prev.get("row_counts", {})
          curr_counts = report["row_counts"]

          delta_rows = []
          for table, curr in curr_counts.items():
              prev_n = prev_counts.get(table)
              if prev_n is not None and curr is not None:
                  diff = curr - prev_n
                  sign = "+" if diff >= 0 else ""
                  delta_rows.append(f"  {table:<30} {curr:>10,}  ({sign}{diff:,})")
              else:
                  delta_rows.append(f"  {table:<30} {str(curr or '—'):>10}")

          unmatched = report["unmatched_players"]
          unmatched_lines = "\n".join(
              f"  - {u['raw_name']} ({u['source']}, {u['method']})"
              for u in unmatched[:50]
          )
          if len(unmatched) > 50:
              unmatched_lines += f"\n  ... and {len(unmatched) - 50} more"

          body = f"""NFL Data Refresh Complete — {report['run_at'][:10]}

ROW COUNT CHANGES
{chr(10).join(delta_rows)}

UNMATCHED PLAYERS ({report['unmatched_count']} total)
{unmatched_lines or '  None'}

NFL CHECK OUTPUT
{check_out[:3000]}
"""

          resend.api_key = os.environ["RESEND_API_KEY"]
          params = resend.Emails.SendParams(
              from_="nfl-pipeline@" + os.environ["RESEND_DOMAIN"],
              to=["arbrown83@gmail.com"],
              subject=f"NFL Refresh complete — {report['run_at'][:10]}",
              text=body,
          )
          resend.Emails.send(params)
          print("Report email sent.")
          PYEOF
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_DOMAIN: ${{ secrets.RESEND_DOMAIN }}
          REPORT_JSON: ${{ env.REPORT_JSON }}

      - name: Send failure alert email
        if: failure()
        run: |
          uv run python - << 'PYEOF'
          import os
          import resend

          run_url = (
              f"https://github.com/{os.environ['GITHUB_REPOSITORY']}"
              f"/actions/runs/{os.environ['GITHUB_RUN_ID']}"
          )
          resend.api_key = os.environ["RESEND_API_KEY"]
          params = resend.Emails.SendParams(
              from_="nfl-pipeline@" + os.environ["RESEND_DOMAIN"],
              to=["arbrown83@gmail.com"],
              subject="NFL Refresh FAILED",
              text=f"The weekly NFL data refresh failed.\n\nRun: {run_url}\n\nCheck the Actions log for details.",
          )
          resend.Emails.send(params)
          PYEOF
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_DOMAIN: ${{ secrets.RESEND_DOMAIN }}
