name: Weekly NFL Data Refresh

on:
  schedule:
    - cron: "0 10 * * 2"  # Tuesday 10:00 UTC (after Monday night nflverse publish)
  workflow_dispatch:       # allow manual trigger for testing

permissions:
  contents: write

env:
  FLY_APP: nfl-data-api
  REPORT_JSON: /tmp/nfl_report.json

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --frozen --no-dev

      - name: Save previous row counts
        run: |
          if [ -f "data/last_run_counts.json" ]; then
            cp data/last_run_counts.json /tmp/prev_counts.json
          else
            echo '{}' > /tmp/prev_counts.json
          fi

      - name: Run full pipeline
        run: uv run nfl run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Capture nfl check output
        run: uv run nfl check 2>&1 | tee /tmp/nfl_check.txt
        continue-on-error: true

      - name: Generate report JSON
        run: uv run nfl report --format json --output "$REPORT_JSON"

      - name: Commit updated counts file
        run: |
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add data/last_run_counts.json
          git diff --staged --quiet || git commit -m "chore: update last_run_counts.json [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install flyctl
        run: curl -L https://fly.io/install.sh | sh

      - name: Upload nfl.duckdb to Fly.io volume
        run: |
          export PATH="$HOME/.fly/bin:$PATH"
          # Wake the machine — sftp requires a running VM
          fly machines start $(fly machines list --app "$FLY_APP" -j | jq -r '.[0].id') --app "$FLY_APP" || true
          for i in $(seq 1 12); do
            fly status --app "$FLY_APP" -j | jq -e '.Machines[0].state == "started"' && break
            sleep 5
          done
          # Sync to ensure write is complete before upload
          sync
          fly sftp shell --app "$FLY_APP" << 'SFTP'
          put data/nfl.duckdb /data/nfl.duckdb
          SFTP
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Restart Fly machines to reload DB
        run: |
          export PATH="$HOME/.fly/bin:$PATH"
          fly machines restart --app "$FLY_APP"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Send success report email
        if: success()
        run: |
          uv run python - << 'PYEOF'
          import json, os
          import resend

          report     = json.loads(open(os.environ["REPORT_JSON"]).read())
          prev       = json.loads(open("/tmp/prev_counts.json").read())
          check_out  = open("/tmp/nfl_check.txt").read()

          prev_counts = prev.get("row_counts", {})
          curr_counts = report["row_counts"]

          delta_rows = []
          for table, curr in curr_counts.items():
              prev_n = prev_counts.get(table)
              if prev_n is not None and curr is not None:
                  diff = curr - prev_n
                  sign = "+" if diff >= 0 else ""
                  delta_rows.append("  " + table.ljust(30) + " " + str(curr).rjust(10) + "  (" + sign + str(diff) + ")")
              else:
                  delta_rows.append("  " + table.ljust(30) + " " + str(curr or "—").rjust(10))

          unmatched = report["unmatched_players"]
          unmatched_lines = "\n".join(
              "  - " + u["raw_name"] + " (" + u["source"] + ", " + u["method"] + ")"
              for u in unmatched[:50]
          )
          if len(unmatched) > 50:
              unmatched_lines += "\n  ... and " + str(len(unmatched) - 50) + " more"

          body = "\n".join([
              "NFL Data Refresh Complete — " + report["run_at"][:10],
              "",
              "ROW COUNT CHANGES",
              "\n".join(delta_rows),
              "",
              "UNMATCHED PLAYERS (" + str(report["unmatched_count"]) + " total)",
              unmatched_lines or "  None",
              "",
              "NFL CHECK OUTPUT",
              check_out[:3000],
          ])

          resend.api_key = os.environ["RESEND_API_KEY"]
          resend.Emails.send({
              "from": "nfl-pipeline@" + os.environ["RESEND_DOMAIN"],
              "to": ["arbrown83@gmail.com"],
              "subject": "NFL Refresh complete — " + report["run_at"][:10],
              "text": body,
          })
          print("Report email sent.")
          PYEOF
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_DOMAIN: ${{ secrets.RESEND_DOMAIN }}
          REPORT_JSON: ${{ env.REPORT_JSON }}

      - name: Send failure alert email
        if: failure()
        run: |
          uv run python - << 'PYEOF'
          import os
          import resend

          run_url = (
              "https://github.com/" + os.environ["GITHUB_REPOSITORY"]
              + "/actions/runs/" + os.environ["GITHUB_RUN_ID"]
          )
          resend.api_key = os.environ["RESEND_API_KEY"]
          resend.Emails.send({
              "from": "nfl-pipeline@" + os.environ["RESEND_DOMAIN"],
              "to": ["arbrown83@gmail.com"],
              "subject": "NFL Refresh FAILED",
              "text": "The weekly NFL data refresh failed.\n\nRun: " + run_url + "\n\nCheck the Actions log for details.",
          })
          PYEOF
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_DOMAIN: ${{ secrets.RESEND_DOMAIN }}
