app = "nfl-data-api"
primary_region = "iad"

[build]

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    soft_limit = 80
    hard_limit = 120

[[mounts]]
  source = "nfl_data"
  destination = "/data"
  initial_size = "3gb"
